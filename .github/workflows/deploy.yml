name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  # JOB 1: Detect which services changed
  changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            primary-backend: ['primary-backend/**']
            hook: ['hook/**']
            worker: ['worker/**']
            processor: ['processor/**']

  # JOB 2: Build + push Docker images (only changed services)
  build:
    needs: changes
    if: needs.changes.outputs.services != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJSON(needs.changes.outputs.services) }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/zapier-${{ matrix.service }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/zapier-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # JOB 3: SSH into EC2 and pull + restart only changed services
  deploy:
    needs: [changes, build]
    if: needs.changes.outputs.services != '[]'
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/Zapier
            git pull origin main

            for service in $(echo '${{ needs.changes.outputs.services }}' | jq -r '.[]'); do
              echo "Redeploying $service..."
              docker compose -f docker-compose.prod.yml pull $service
              docker compose -f docker-compose.prod.yml up -d --no-deps $service
            done

            docker image prune -f
            echo "Deploy complete!"
